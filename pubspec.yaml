name: jp_chat_app
description: "JP Chat Talk,Fun,Chat - Real working messaging app with Firebase backend"
publish_to: 'none'

version: 2.0.0+2

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Dependencies
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  
  # Firebase - Complete Backend
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  cloud_firestore: ^4.13.6
  firebase_storage: ^11.6.0
  firebase_database: ^10.4.0
  firebase_messaging: ^14.7.10
  
  # UI & Animation
  flutter_spinkit: ^5.2.0
  cached_network_image: ^3.3.0
  
  # File & Image Handling
  image_picker: ^1.0.4
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  
  # Utils
  intl: ^0.19.0
  uuid: ^4.1.0
  timeago: ^3.6.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true