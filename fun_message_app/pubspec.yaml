name: fun_message_app
description: JP Chat Talk,Fun,Chat - A comprehensive messaging app with video calls, username-based contacts, and advanced features.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.1.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Core Dependencies
  cupertino_icons: ^1.0.6
  
  # State Management
  provider: ^6.1.1
  get: ^4.6.6
  
  # Firebase Dependencies
  firebase_core: ^2.24.2
  firebase_auth: ^4.15.3
  firebase_database: ^10.4.0
  firebase_storage: ^11.6.0
  cloud_firestore: ^4.13.6
  
  # UI Components
  flutter_spinkit: ^5.2.0
  
  # Image & File Handling
  image_picker: ^1.0.4
  cached_network_image: ^3.3.0
  file_picker: ^6.1.1
  path_provider: ^2.1.1
  mime: ^1.0.4
  photo_view: ^0.14.0
  
  # Video/Voice Calls (placeholder for now)
  permission_handler: ^11.1.0
  
  # Push Notifications
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0
  
  # Search & Groups
  flutter_slidable: ^3.0.1
  
  # Utils
  intl: ^0.19.0
  url_launcher: ^6.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/